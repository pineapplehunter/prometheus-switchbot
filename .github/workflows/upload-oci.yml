name: Build OCI
on:
  push:
    branches:
      - main

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login --username "${{ github.actor }}" --password-stdin ghcr.io

      - name: Setup nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4

      - name: Build image
        run: nix build

      - name: Load image to docker
        run: |
          ./result | docker load
          docker image tag prometheus-switchbot:latest ghcr.io/pineapplehunter/prometheus-switchbot:latest

      - name: Upload image
        run: docker push ghcr.io/pineapplehunter/prometheus-switchbot:latest
